<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spin-Throw Arena — Prototype</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0e1117;
    color: #c9d1d9;
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
    overflow: hidden;
  }
  #wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: #11161f;
    box-shadow: 0 0 0 1px #30363d, 0 10px 40px rgba(0,0,0,0.5);
    cursor: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(8, 11, 16, 0.82);
    text-align: center;
    gap: 10px;
    z-index: 10;
  }
  #overlay h1 { margin: 0; font-size: 22px; color: #e6edf3; }
  #overlay p { margin: 2px; font-size: 13px; line-height: 1.6; color: #8b949e; }
  #overlay .key { color: #58a6ff; }
  #overlay.hidden { display: none; }
  #hud {
    position: absolute;
    top: 10px;
    left: 12px;
    font-size: 12px;
    line-height: 1.5;
    color: #8b949e;
    pointer-events: none;
    z-index: 5;
    white-space: pre;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="640"></canvas>
  <div id="hud"></div>
  <div id="overlay">
    <h1>Spin-Throw Arena</h1>
    <p><span class="key">Click</span> to start (locks the mouse for spinning)</p>
    <p><span class="key">WASD</span> move &nbsp;•&nbsp; <span class="key">move mouse left/right</span> to spin</p>
    <p><span class="key">Hold left-click</span> + touch the ball to catch &nbsp;•&nbsp; <span class="key">release</span> to throw</p>
    <p style="margin-top:8px;font-size:11px">Esc releases the mouse · click again to resume</p>
  </div>
</div>

<script>
// =============================================================
//  TUNING — tweak these to change game feel
// =============================================================
const CFG = {
  // Player movement (independent of rotation)
  PLAYER_RADIUS: 26,
  PLAYER_SPEED: 260,          // px/sec, WASD movement speed

  // Spin / rotation (driven by horizontal mouse motion)
  ROTATION_SENSITIVITY: 0.015, // rad/sec of spin added per pixel of horizontal mouse motion
  ANGULAR_DAMPING: 0.90,       // per-frame (60fps) multiplier; spin winds down when you stop dragging
  MAX_ANGULAR_VELOCITY: 26,    // rad/sec hard cap on spin speed

  // Ball
  BALL_RADIUS: 12,
  BALL_FRICTION: 0.997,        // per-frame (60fps) linear damping on a free ball (1 = frictionless)

  // Orbit while held: ball sits on player's edge. Radius = sum of radii * this factor.
  ORBIT_RADIUS_FACTOR: 1.0,    // 1.0 = ball touches the player's edge exactly

  // Collisions / bounce
  WALL_RESTITUTION: 0.9,       // how bouncy arena walls are (1 = perfectly elastic)
  PLAYER_RESTITUTION: 0.85,    // how bouncy the player is when the ball hits them (not holding)

  // Throw
  ADD_PLAYER_VELOCITY_ON_THROW: true, // also impart the player's running velocity to the thrown ball
  RELEASE_NUDGE: 2,            // px the ball is pushed outward on release so it doesn't instantly re-collide

  // Arena
  WALL_THICKNESS: 16,
};
// =============================================================

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");
const overlay = document.getElementById("overlay");

const W = canvas.width;
const H = canvas.height;

// Arena inner bounds (where the ball is allowed to be — accounting for wall thickness)
const arena = {
  left: CFG.WALL_THICKNESS,
  top: CFG.WALL_THICKNESS,
  right: W - CFG.WALL_THICKNESS,
  bottom: H - CFG.WALL_THICKNESS,
};

const player = {
  x: W * 0.35,
  y: H * 0.5,
  vx: 0,            // current linear velocity (derived from WASD), used for throw + bounce feel
  vy: 0,
  angle: 0,         // facing/orientation in radians
  omega: 0,         // angular velocity (rad/sec) — THIS drives throw power
};

const ball = {
  x: W * 0.65,
  y: H * 0.5,
  vx: 0,
  vy: 0,
  held: false,
  // angular offset of the ball relative to player.angle, captured at the moment of catch
  // (so the ball grabs onto wherever it touched, then orbits with the player)
  attachOffset: 0,
};

// Input state
const keys = { w: false, a: false, s: false, d: false };
let lmbDown = false;
let mouseDXThisFrame = 0;   // accumulated horizontal mouse motion since last frame
let pointerLocked = false;
let started = false;        // game runs once the user has clicked to start

// ---- Input wiring ----
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k in keys) { keys[k] = true; e.preventDefault(); }
});
window.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (k in keys) { keys[k] = false; e.preventDefault(); }
});

canvas.addEventListener("mousedown", (e) => {
  if (e.button === 0) {
    // Start on first click. Pointer lock is a nice-to-have (continuous spin without
    // the cursor hitting a screen edge) but NOT required — it's blocked in some
    // embedded/iframe contexts, so we never gate gameplay on it.
    if (!started) {
      started = true;
      overlay.classList.add("hidden");
    }
    if (!pointerLocked && canvas.requestPointerLock) {
      const p = canvas.requestPointerLock();
      if (p && p.catch) p.catch(() => {}); // ignore if the environment denies it
    }
    lmbDown = true;
  }
});
window.addEventListener("mouseup", (e) => {
  if (e.button === 0) lmbDown = false;
});

document.addEventListener("pointerlockchange", () => {
  pointerLocked = (document.pointerLockElement === canvas);
});

document.addEventListener("mousemove", (e) => {
  // movementX is available with or without pointer lock; only horizontal motion
  // matters for spin, vertical is ignored entirely.
  if (started) mouseDXThisFrame += e.movementX;
});

// ---- Helpers ----
function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }
// Convert a per-60fps-frame multiplier into a dt-correct factor
function damp(perFrame, dt) { return Math.pow(perFrame, dt * 60); }

// ---- Simulation ----
function update(dt) {
  // --- Player linear movement (fully independent of rotation) ---
  let mx = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
  let my = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
  if (mx !== 0 || my !== 0) {
    const len = Math.hypot(mx, my);
    mx /= len; my /= len;
  }
  player.vx = mx * CFG.PLAYER_SPEED;
  player.vy = my * CFG.PLAYER_SPEED;
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  // Keep player inside the arena
  player.x = clamp(player.x, arena.left + CFG.PLAYER_RADIUS, arena.right - CFG.PLAYER_RADIUS);
  player.y = clamp(player.y, arena.top + CFG.PLAYER_RADIUS, arena.bottom - CFG.PLAYER_RADIUS);

  // --- Spin: turn accumulated horizontal mouse motion into angular velocity ---
  player.omega += mouseDXThisFrame * CFG.ROTATION_SENSITIVITY;
  mouseDXThisFrame = 0;
  player.omega *= damp(CFG.ANGULAR_DAMPING, dt);                 // flywheel wind-down
  player.omega = clamp(player.omega, -CFG.MAX_ANGULAR_VELOCITY, CFG.MAX_ANGULAR_VELOCITY);
  player.angle += player.omega * dt;

  const orbitR = (CFG.PLAYER_RADIUS + CFG.BALL_RADIUS) * CFG.ORBIT_RADIUS_FACTOR;

  if (ball.held) {
    // Ball is locked to the player's circumference at its captured angular offset.
    const theta = player.angle + ball.attachOffset;
    ball.x = player.x + Math.cos(theta) * orbitR;
    ball.y = player.y + Math.sin(theta) * orbitR;

    if (!lmbDown) {
      // --- THROW --- launch with the ball's REAL tangential velocity at this instant.
      // A point orbiting at angle theta with angular velocity omega has
      // tangential velocity = omega * R in the tangent direction (-sin, cos).
      const tangent = { x: -Math.sin(theta), y: Math.cos(theta) };
      ball.vx = tangent.x * player.omega * orbitR;
      ball.vy = tangent.y * player.omega * orbitR;
      if (CFG.ADD_PLAYER_VELOCITY_ON_THROW) {
        ball.vx += player.vx;
        ball.vy += player.vy;
      }
      // Nudge it just outside the player so it doesn't immediately register a collision.
      const nx = Math.cos(theta), ny = Math.sin(theta);
      ball.x += nx * CFG.RELEASE_NUDGE;
      ball.y += ny * CFG.RELEASE_NUDGE;
      ball.held = false;
    }
  } else {
    // --- Free ball physics ---
    ball.vx *= damp(CFG.BALL_FRICTION, dt);
    ball.vy *= damp(CFG.BALL_FRICTION, dt);
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Wall bounces
    if (ball.x - CFG.BALL_RADIUS < arena.left) {
      ball.x = arena.left + CFG.BALL_RADIUS;
      ball.vx = -ball.vx * CFG.WALL_RESTITUTION;
    } else if (ball.x + CFG.BALL_RADIUS > arena.right) {
      ball.x = arena.right - CFG.BALL_RADIUS;
      ball.vx = -ball.vx * CFG.WALL_RESTITUTION;
    }
    if (ball.y - CFG.BALL_RADIUS < arena.top) {
      ball.y = arena.top + CFG.BALL_RADIUS;
      ball.vy = -ball.vy * CFG.WALL_RESTITUTION;
    } else if (ball.y + CFG.BALL_RADIUS > arena.bottom) {
      ball.y = arena.bottom - CFG.BALL_RADIUS;
      ball.vy = -ball.vy * CFG.WALL_RESTITUTION;
    }

    // --- Player <-> ball interaction ---
    const dx = ball.x - player.x;
    const dy = ball.y - player.y;
    const dist = Math.hypot(dx, dy);
    const touchDist = CFG.PLAYER_RADIUS + CFG.BALL_RADIUS;
    if (dist <= touchDist) {
      if (lmbDown) {
        // CATCH: grab the ball at the point of contact and remember its angular offset.
        ball.held = true;
        const contactAngle = Math.atan2(dy, dx);
        ball.attachOffset = contactAngle - player.angle;
      } else {
        // BOUNCE off the player like an obstacle (relative-velocity reflection,
        // so a moving player can knock a resting ball away).
        const nx = dist > 0 ? dx / dist : 1;
        const ny = dist > 0 ? dy / dist : 0;
        const rvx = ball.vx - player.vx;
        const rvy = ball.vy - player.vy;
        const vn = rvx * nx + rvy * ny;
        if (vn < 0) { // only if they're approaching each other
          const j = -(1 + CFG.PLAYER_RESTITUTION) * vn;
          ball.vx += j * nx;
          ball.vy += j * ny;
        }
        // Push the ball out so it isn't overlapping the player.
        ball.x = player.x + nx * (touchDist + 0.5);
        ball.y = player.y + ny * (touchDist + 0.5);
      }
    }
  }
}

// ---- Rendering ----
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Arena walls
  ctx.fillStyle = "#1b2230";
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#11161f";
  ctx.fillRect(arena.left, arena.top, arena.right - arena.left, arena.bottom - arena.top);
  ctx.strokeStyle = "#30363d";
  ctx.lineWidth = 2;
  ctx.strokeRect(arena.left, arena.top, arena.right - arena.left, arena.bottom - arena.top);

  const orbitR = (CFG.PLAYER_RADIUS + CFG.BALL_RADIUS) * CFG.ORBIT_RADIUS_FACTOR;

  // Player
  ctx.beginPath();
  ctx.arc(player.x, player.y, CFG.PLAYER_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = ball.held ? "#3fb950" : "#58a6ff";
  ctx.fill();
  // Facing indicator (shows rotation)
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(
    player.x + Math.cos(player.angle) * CFG.PLAYER_RADIUS,
    player.y + Math.sin(player.angle) * CFG.PLAYER_RADIUS
  );
  ctx.strokeStyle = "#0d1117";
  ctx.lineWidth = 3;
  ctx.stroke();

  // Orbit guide while holding
  if (ball.held) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, orbitR, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(63,185,80,0.25)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, CFG.BALL_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = "#f0883e";
  ctx.fill();

  // HUD: live physics readouts (handy for tuning)
  const ballSpeed = Math.hypot(ball.vx, ball.vy);
  const projThrow = Math.abs(player.omega) * orbitR;
  hud.textContent =
    `spin (omega):   ${player.omega.toFixed(2)} rad/s\n` +
    `ball state:     ${ball.held ? "HELD" : "free"}\n` +
    `ball speed:     ${ballSpeed.toFixed(0)} px/s\n` +
    `throw if release now: ${projThrow.toFixed(0)} px/s`;
}

// ---- Main loop ----
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.033) dt = 0.033; // clamp big hitches (e.g. tab switch) for stable physics
  if (started) update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
