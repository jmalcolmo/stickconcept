<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stick &amp; Ball — A Dark Trial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <!-- MENU: browse + pick a game mode -->
  <div id="menuScreen" class="screen">
    <header class="menu-header">
      <p class="menu-eyebrow">— a spin-throw trial —</p>
      <h1>Stick &amp; Ball</h1>
      <p class="menu-sub">Choose your proving ground.</p>
    </header>
    <div id="modeList"></div>
    <footer class="menu-footer">
      <span class="key">WASD</span> move ·
      <span class="key">mouse</span> spin ·
      <span class="key">hold L-click</span> catch ·
      <span class="key">release mid-spin</span> flick
    </footer>
  </div>

  <!-- GAME -->
  <div id="gameScreen" class="screen hidden">
    <canvas id="game" width="960" height="640"></canvas>
    <div id="hud"></div>
    <p id="hint">Hold left-click to catch &amp; carry · spin and release to flick · Esc to pause</p>

    <!-- Pause overlay -->
    <div id="pauseOverlay" class="overlay hidden">
      <div class="panel">
        <h2>Paused</h2>
        <button id="resumeBtn" type="button" class="btn">Resume</button>
        <button id="pauseMenuBtn" type="button" class="btn btn-ghost">Abandon Trial</button>
      </div>
    </div>

    <!-- Game over overlay -->
    <div id="overOverlay" class="overlay hidden">
      <div class="panel">
        <div id="overBody"></div>
        <button id="playAgainBtn" type="button" class="btn">Try Again</button>
        <button id="overMenuBtn" type="button" class="btn btn-ghost">Back to Hall</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
